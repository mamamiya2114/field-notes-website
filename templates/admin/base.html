<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} · Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1714;--paper:#faf7f2;--card:#fff;--accent:#b5542d;--muted:#6e675e;
    --line:#e3ddd2;--ok:#2f7d4f;--warn:#b5542d;
    --serif:'Fraunces',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f4f0e9;color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;
      padding:.9rem 1.4rem;background:rgba(250,247,242,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .brand{font-family:var(--serif);font-weight:600;font-size:1.15rem}
  .brand span{color:var(--accent)}
  .top nav{display:flex;gap:1.4rem;align-items:center}
  .top nav a{font-size:.84rem;font-weight:500;letter-spacing:.04em;color:var(--muted);text-decoration:none}
  .top nav a.active,.top nav a:hover{color:var(--accent)}
  .wrap{max-width:1060px;margin:0 auto;padding:2rem 1.4rem 5rem}
  h1.page{font-family:var(--serif);font-weight:400;font-size:1.9rem;margin-bottom:.3rem}
  .sub{color:var(--muted);font-size:.92rem;margin-bottom:1.8rem}
  .flash{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);
      padding:.7rem 1rem;border-radius:8px;margin-bottom:1.2rem;font-size:.9rem}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.1rem;border-radius:999px;border:1px solid var(--line);
      background:#fff;color:var(--ink);font-family:var(--sans);font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn-primary:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-accent:hover{filter:brightness(1.07);color:#fff}
  .btn-sm{padding:.38rem .7rem;font-size:.78rem}
  .btn-danger:hover{border-color:#c0392b;color:#c0392b}
  /* accessibility + interaction states (skill: focus-states, disabled-states, submit-feedback) */
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}
  :focus:not(:focus-visible){outline:none}
  .btn:active{transform:translateY(1px)}
  .btn[disabled],.btn.is-loading{opacity:.55;cursor:not-allowed;pointer-events:none}
  .btn.is-loading::before{content:"";width:.8em;height:.8em;border:2px solid currentColor;border-right-color:transparent;
      border-radius:50%;display:inline-block;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.btn.is-loading::before{animation:none}.btn:active{transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.4rem;margin-bottom:1.3rem}
  label{display:block;font-size:.78rem;font-weight:600;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;margin-bottom:.35rem}
  input[type=text],input[type=password],input[type=email],textarea,select{
      width:100%;padding:.6rem .8rem;border:1px solid var(--line);border-radius:9px;font-family:var(--sans);
      font-size:.95rem;background:#fff;outline:none;color:var(--ink)}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:3.2rem;line-height:1.7}
  .field{margin-bottom:1rem}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .pill{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.05em;padding:.2rem .6rem;border-radius:999px;text-transform:uppercase}
  .pill-pub{background:#e4f3ea;color:var(--ok)}
  .pill-draft{background:#f1ece2;color:var(--muted)}
  .muted{color:var(--muted)}
  .hint{font-size:.8rem;color:var(--muted);margin-top:.3rem}
  .inline{display:inline}
  @media(max-width:640px){
    .row{grid-template-columns:1fr}
    .top{flex-wrap:wrap;gap:.5rem}
    .top nav{flex-wrap:wrap;gap:.8rem 1rem}
  }
</style>
</head>
<body>
{% block top %}
<div class="top">
  <a class="brand" href="/admin">Field<span>Notes</span> · Admin</a>
  <nav>
    <a href="/admin" class="{{ 'active' if active=='essays' }}">Essays</a>
    <a href="/admin/site" class="{{ 'active' if active=='site' }}">Site content</a>
    <a href="/admin/gallery" class="{{ 'active' if active=='gallery' }}">Archive</a>
    <a href="/admin/stats" class="{{ 'active' if active=='stats' }}">Analytics</a>
    <a href="/" target="_blank">View site ↗</a>
    <form method="post" action="/admin/logout" class="inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm">Sign out</button></form>
  </nav>
</div>
{% endblock %}
<div class="wrap">
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block body %}{% endblock %}
</div>
<script>
  // submit feedback: spinner + disable on the clicked button, so slow uploads
  // never look frozen and can't be double-submitted (skill: submit-feedback, loading-buttons)
  document.addEventListener('submit', function(e){
    if (e.defaultPrevented) return;                 // cancelled by a confirm() dialog
    var btn = e.target.querySelector('button[type=submit], button:not([type])');
    if (!btn || btn.classList.contains('is-loading')) return;
    var label = btn.textContent.trim();
    btn.dataset.label = label;
    btn.classList.add('is-loading');
    if (label) btn.textContent = ' Working…';
  }, true);
</script>
</body>
</html>
